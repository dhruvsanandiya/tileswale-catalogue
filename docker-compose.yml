version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tileswale_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tileswale_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tileswale_network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tileswale_server
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-tileswale_db}
      PORT: ${PORT:-4000}
      NODE_ENV: ${NODE_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - tileswale_network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: tileswale_client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    networks:
      - tileswale_network

volumes:
  postgres_data:

networks:
  tileswale_network:
    driver: bridge
